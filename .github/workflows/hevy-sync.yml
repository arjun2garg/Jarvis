name: Sync Hevy → Supabase

on:
  schedule:
    # Twice daily: 9am + 9pm America/Chicago.
    # GitHub Actions cron is UTC-only, so the hour shifts twice a year:
    #   CDT (Mar–Nov): 14:00 + 02:00 UTC → "0 2,14 * * *"
    #   CST (Nov–Mar): 15:00 + 03:00 UTC → "0 3,15 * * *"
    - cron: "0 2,14 * * *"
  workflow_dispatch:          # Allow manual trigger from GitHub UI

jobs:
  sync:
    name: Hevy sync
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync
        run: python sync_hevy.py
        env:
          HEVY_API_KEY:         ${{ secrets.HEVY_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Upload sync log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hevy-sync-failure-${{ github.run_id }}
          path: "*.log"
          if-no-files-found: ignore
